<!DOCTYPE html>

<html lang="en">


 
<head>
 
<meta charset="UTF-8" />
 
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 
<title>Login — Aromas</title>
 
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
 
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-50: #EAF3DE;
   
    --green-100: #C0DD97;
   
    --green-200: #97C459;
   
    --green-400: #639922;
   
    --green-500: #3B6D11;
   
    --green-600: #27500A;
   
    --green-700: #173404;
   
    --text-main: #0f2106;
   
    --text-muted: #3B6D11;
   
    --text-hint: #639922;
   
    --beige: #f4fbec;
   
  }
 
  body {
    font-family: 'DM Sans', sans-serif;
   
    background-color: var(--beige);
   
    min-height: 100vh;
   
    display: flex;
   
    align-items: stretch;
   
  }
 
  .split-left {
   
    flex: 1;
   
    background: var(--green-700);
   
    display: flex;
   
    flex-direction: column;
   
    align-items: center;
   
    justify-content: center;
   
    padding: 60px 48px;
   
    position: relative;
   
    overflow: hidden;
   
  }
  .split-left::before {
   
    content: '';
   
    position: absolute;
   
    top: -80px; left: -80px;
   
    width: 320px; height: 320px;
   
    border-radius: 48%;
   
    background: var(--green-600);

   
    opacity: 0.5;
  }
  .split-left::after {
   
    content: '';
   
    position: absolute;
   
    bottom: -60px; right: -60px;
   
    width: 240px; height: 240px;
   
    border-radius: 50%;
   
    background: var(--green-500);
   
    opacity: 0.35;
   
  }
 
  .brand-block {
   
    position: relative;
   
    z-index: 2;
   
    text-align: center;
   
  }
 
  .brand-icon {

   
    width: 65px;
   
    height: 64px;
   
    background: var(--green-100);
   
    border-radius: 18px;
   
    display: flex;
   
    align-items: center;
   
    justify-content: center;
   
    margin: 0 auto 28px;
   
  }
 
  .brand-icon svg {
   
    width: 32px; height: 32px;
   
    fill: none;
   
    stroke: var(--green-600);
   
    stroke-width: 2;
   
    stroke-linecap: round;
   
    stroke-linejoin: round;
   
  }
  .brand-name {
   
    font-family: 'Cormorant Garamond', serif;
   
    font-size: 42px;
   
    font-weight: 600;
   
    color: var(--green-50);
   
    letter-spacing: 0.02em;
   
    line-height: 1.1;
   
    margin-bottom: 12px;
   
  }
 
  .brand-tagline {
   
   
    font-size: 14px;

   
    font-weight: 300;
   
   
    color: var(--green-100);

   
    letter-spacing: 0.06em;
   


   
    text-transform: uppercase;
   
  }
  .decorative-line {
   
    width: 48px; height: 1px;
   
    background: var(--green-400);
   
    margin: 24px auto;
  }
 
  .brand-quote {
   
    font-family: 'Cormorant Garamond', serif;
   
    font-size: 18px;
   
    font-weight: 400;
   
    font-style: italic;
   
    color: var(--green-100);
   
    opacity: 0.75;
   
    max-width: 240px;
   
    line-height: 1.6;
   
  }
  .split-right {
   
    flex: 1.1;
   
    display: flex;
   
    align-items: center;
   
    justify-content: center;
   
    background: var(--beige);
   
    padding: 60px 48px;
   
  }
  .login-card { width: 100%; max-width: 400px; }


 
  .login-header { margin-bottom: 36px; }

 
  .login-title {

   
    font-family: 'Cormorant Garamond', serif;
   
   
    font-size: 34px;
   
   
    font-weight: 600;
   
   
    color: var(--text-main);
   
    margin-bottom: 6px;
   
  }
  .login-subtitle {
   
    font-size: 14px;
   
   
    color: var(--text-muted);

   
    font-weight: 300;
   
  }
  .form-group { margin-bottom: 20px; }
 
  label {
   
    display: block;
   
    font-size: 12px;
   
    font-weight: 500;
   
    letter-spacing: 0.08em;
   
    text-transform: uppercase;
   
    color: var(--text-muted);
   
    margin-bottom: 8px;
   
  }
  input[type="email"], input[type="password"] {
   
    width: 100%;
   
    padding: 14px 16px;

   
    font-family: 'DM Sans', sans-serif;
   
    font-size: 15px;
   
    font-weight: 400;
   
    color: var(--text-main);
   
    background: var(--green-50);
   
    border: 1.5px solid var(--green-100);
   
    border-radius: 10px;
   
    outline: none;
   
    transition: border-color 0.2s, background 0.2s;
   
    appearance: none;
   
  }
 
  input[type="email"]::placeholder, input[type="password"]::placeholder {
   
    color: var(--text-hint);
   
  }
  input[type="email"]:focus, input[type="password"]:focus {
   
    border-color: var(--green-400);
   
    background: #ffffff;
   
  }
  .input-with-icon { position: relative; }
 
  .input-with-icon input { padding-left: 44px; }
 
  .input-icon {
   
    position: absolute;
   
    left: 14px; top: 50%;
   
    transform: translateY(-50%);
   
    width: 18px; height: 18px;
   
    color: var(--text-hint);
   
    pointer-events: none;
   
  }
 
  .row-between {



   
    display: flex;
   
    align-items: center;
   
    justify-content: space-between;
   
    margin-bottom: 28px;
   
   
    margin-top: 4px;
   
  }
  .checkbox-label {
   
    display: flex;
   
    align-items: center;
   
    gap: 8px;
   
    font-size: 13px;
   
    color: var(--text-mute
               d);
    cursor: pointer;
   
    text-transform: none;
   
    letter-spacing: 0;
   
    font-weight: 400;
   
  }
  input[type="checkbox"] {
   
    width: 16px; height: 16px;
   
    accent-color: var(--green-500);
   
    cursor: pointer;
   
  }
 
  .forgot-link {
   
    font-size: 13px;
   
    color: var(--green-500);
   
    text-decoration: none;
   
    font-weight: 400;
   
  }
 
  .forgot-link:hover { text-decoration: underline; }
 
  .btn-login {
   
    width: 100%;
   
    padding: 15px;
   
    background: var(--green-600);
   
    color: var(--green-50);
   
    font-family: 'DM Sans', sans-serif;
   
    font-size: 15px;
   
    font-weight: 500;
   
    letter-spacing: 0.04em;
   
    border: none;
   
    border-radius: 10px;
   
    cursor: pointer;
   
    transition: background 0.2s, transform 0.1s;
   
  }
  .btn-login:hover { background: var(--green-700); }
 
  .btn-login:active { transform: scale(0.98); }
 
  .divider {
   
    display: flex;
   
    align-items: center;
   
    gap: 12px;
   
    margin: 24px 0;

   
  }
 
  .divider-line { flex: 1; height: 1px; background: var(--green-100); }
 
 
  .divider-text {
   
    font-size: 12px;
   
    color: var(--text-hint);
   
    letter-spacing: 0.06em;
   
    text-transform: uppercase;
   
  }
  .btn-social {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--green-100);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    margin-bottom: 10px;
  }
  .btn-social:hover { background: var(--green-50); border-color: var(--green-200); }
 
  .btn-social svg { width: 18px; height: 18px; }
 
  .signup-row {
   
    text-align: center;

   
    margin-top: 28px;
   
    font-size: 13.5px;


   
    color: var(--text-muted);
   
  }
 
  .signup-row a {
    color: var(--green-500);
   
    text-decoration: none;
   
    font-weight: 500;
   
  }
  .signup-row a:hover { text-decoration: underline; }
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .split-left { flex: none; padding: 48px 32px; }
    .brand-quote { display: none; }
    .split-right { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="split-left">
  <div class="brand-block">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="brand-name">arias</div>
    <div class="brand-tagline">Premium Collection</div>
    <div class="decorative-line"></div>
    <div class="brand-quote">"Crafted with intention, worn with elegance."</div>
  </div>
</div>

<div class="split-right">
  <div class="login-card">
    <div class="login-header">
      <div class="login-title">Welcome back</div>
      <div class="login-subtitle">Sign in to your account to continue</div>
    </div>

    <form onsubmit="return false;">
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-with-icon">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input type="email" id="email" placeholder="hello@example.com" autocomplete="email" />
        </div>
      </div>

     
      <div class="form-group">
       
        <label for="password">Password</label>
       
        <div class="input-with-icon">
         
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
           
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
           
          </svg>
         
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
         
        </div>
       
      </div>

      <div class="row-between">
        <label class="checkbox-label">
          <input type="checkbox" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign in</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-social">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="signup-row">
      No account? <a href="#">Create one</a>
    </div>
  </div>
</div>

</body>
</html>
