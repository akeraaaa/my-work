<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumière — Product Booklet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0e0b08;
  --cream:#faf6ef;
  --warm:#f2e8d5;
  --gold:#b8922a;
  --gold-light:#d4ae5a;
  --rust:#9c3d2e;
  --sage:#4a6741;
  --muted:#8a7a68;
  --border:#ddd0bb;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Jost',sans-serif;
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--warm);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

/* ── COVER ── */
.cover{
  min-height:100vh;
  background:var(--ink);
  display:grid;
  grid-template-columns:1fr 1fr;
  position:relative;
  overflow:hidden;
}
.cover-left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 60px;
  position:relative;
  z-index:2;
}
.cover-eyebrow{
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:11px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--gold-light);
  margin-bottom:32px;
}
.cover-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(56px,7vw,96px);
  font-weight:900;
  line-height:0.95;
  color:var(--cream);
  margin-bottom:28px;
}
.cover-title em{
  font-style:italic;
  color:var(--gold-light);
  display:block;
}
.cover-line{
  width:60px;height:1px;
  background:var(--gold);
  margin-bottom:28px;
}
.cover-desc{
  font-size:15px;
  font-weight:300;
  line-height:1.8;
  color:#b0a090;
  max-width:320px;
  margin-bottom:48px;
}
.cover-cta{
  display:inline-flex;
  align-items:center;
  gap:14px;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--gold-light);
  text-decoration:none;
  border:1px solid var(--gold);
  padding:16px 32px;
  transition:all 0.3s;
}
.cover-cta:hover{background:var(--gold);color:var(--ink);}
.cover-cta::after{content:'→';font-size:16px;}
