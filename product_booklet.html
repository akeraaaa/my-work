<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumière — Product Booklet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0e0b08;
  --cream:#faf6ef;
  --warm:#f2e8d5;
  --gold:#b8922a;
  --gold-light:#d4ae5a;
  --rust:#9c3d2e;
  --sage:#4a6741;
  --muted:#8a7a68;
  --border:#ddd0bb;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Jost',sans-serif;
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--warm);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

/* ── COVER ── */
.cover{
  min-height:100vh;
  background:var(--ink);
  display:grid;
  grid-template-columns:1fr 1fr;
  position:relative;
  overflow:hidden;
}
.cover-left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 60px;
  position:relative;
  z-index:2;
}
.cover-eyebrow{
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:11px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--gold-light);
  margin-bottom:32px;
}
.cover-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(56px,7vw,96px);
  font-weight:900;
  line-height:0.95;
  color:var(--cream);
  margin-bottom:28px;
}
.cover-title em{
  font-style:italic;
  color:var(--gold-light);
  display:block;
}
.cover-line{
  width:60px;height:1px;
  background:var(--gold);
  margin-bottom:28px;
}
.cover-desc{
  font-size:15px;
  font-weight:300;
  line-height:1.8;
  color:#b0a090;
  max-width:320px;
  margin-bottom:48px;
}
.cover-cta{
  display:inline-flex;
  align-items:center;
  gap:14px;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--gold-light);
  text-decoration:none;
  border:1px solid var(--gold);
  padding:16px 32px;
  transition:all 0.3s;
}
.cover-cta:hover{background:var(--gold);color:var(--ink);}
.cover-cta::after{content:'→';font-size:16px;}
  .cover-right{
  position:relative;
  overflow:hidden;
}
.cover-right::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,#1a1208 0%,#2d1f0a 50%,#0e0b08 100%);
  z-index:1;
}
.cover-pattern{
  position:absolute;inset:0;
  z-index:2;
  opacity:0.15;
  background-image:
    repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);
  background-size:20px 20px;
}
.cover-product-number{
  position:absolute;
  bottom:60px;right:60px;
  z-index:3;
  font-family:'Playfair Display',serif;
  font-size:160px;
  font-weight:900;
  color:rgba(184,146,42,0.08);
  line-height:1;
  user-select:none;
}
.cover-badge{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  width:220px;height:220px;
  border:1px solid rgba(184,146,42,0.3);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.cover-badge::before{
  content:'';
  position:absolute;inset:10px;
  border:1px solid rgba(184,146,42,0.15);
  border-radius:50%;
}
.cover-badge-year{
  font-size:11px;letter-spacing:0.3em;
  text-transform:uppercase;color:var(--gold);
}
.cover-badge-name{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  color:var(--cream);
  text-align:center;line-height:1.1;
}
.cover-badge-sub{
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;color:#8a7a68;
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--cream);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 60px;
  height:64px;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;
  letter-spacing:0.05em;
  color:var(--ink);
}
.nav-logo span{color:var(--gold);}
.nav-links{
  display:flex;gap:36px;
  list-style:none;
}
.nav-links a{
  font-size:11px;letter-spacing:0.15em;
  text-transform:uppercase;font-weight:400;
  color:var(--muted);text-decoration:none;
  transition:color 0.2s;
}
.nav-links a:hover{color:var(--gold);}

/* ── SECTION COMMON ── */
section{padding:100px 60px;}
.section-label{
  font-size:10px;letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--gold);font-weight:500;
  margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
}
.section-label::before{
  content:'';display:block;
  width:30px;height:1px;background:var(--gold);
}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,4vw,52px);
  font-weight:700;line-height:1.1;
  color:var(--ink);
  margin-bottom:20px;
}
.section-title em{font-style:italic;color:var(--gold);}

/* ── FEATURED PRODUCTS ── */
.featured{background:var(--cream);}
.featured-intro{
  display:grid;grid-template-columns:1fr 1fr;
  gap:60px;align-items:end;
  margin-bottom:72px;
}
.featured-intro-right p{
  font-size:15px;font-weight:300;
  line-height:1.9;color:var(--muted);
}
.products-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}
.product-card{
  background:var(--warm);
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:transform 0.3s;
}
.product-card:hover{transform:translateY(-4px);}
.product-card:hover .product-img-overlay{opacity:1;}
.product-card:first-child{
  grid-column:span 2;
  grid-row:span 1;
}
.product-img{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  display:block;
}
  .product-img-placeholder{
  width:100%;
  aspect-ratio:1;
  background:linear-gradient(135deg,#e8dcc8,#d4c4a0);
  display:flex;align-items:center;justify-content:center;
  font-size:64px;
  position:relative;
  overflow:hidden;
}
.product-card:first-child .product-img-placeholder{
  aspect-ratio:2/1;
  font-size:96px;
}
.product-img-placeholder::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent,transparent 20px,
    rgba(255,255,255,0.08) 20px,rgba(255,255,255,0.08) 21px
  );
}
.product-img-overlay{
  position:absolute;inset:0;
  background:rgba(14,11,8,0.75);
  opacity:0;
  transition:opacity 0.3s;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
}
.overlay-btn{
  font-size:11px;letter-spacing:0.2em;
  text-transform:uppercase;font-weight:500;
  color:var(--cream);
  border:1px solid rgba(255,255,255,0.4);
  padding:12px 28px;
  text-decoration:none;
  transition:all 0.2s;
}
.overlay-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.product-info{
  padding:24px 28px;
  border-top:1px solid var(--border);
  background:var(--cream);
  display:flex;align-items:center;justify-content:space-between;
}
.product-name{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;
  margin-bottom:4px;
}
.product-category{
  font-size:11px;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted);
}
.product-price{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;
  color:var(--gold);
}

/* ── COLLECTION STRIP ── */
.collection-strip{
  background:var(--ink);
  padding:60px;
  display:flex;align-items:center;
  gap:60px;overflow-x:auto;
}
.collection-strip::-webkit-scrollbar{height:3px;}
.strip-item{
  flex-shrink:0;
  text-align:center;
  opacity:0.5;
  transition:opacity 0.3s;
  cursor:pointer;
}
.strip-item:hover{opacity:1;}
.strip-icon{
  width:64px;height:64px;
  border:1px solid rgba(184,146,42,0.3);
  border-radius:50%;
  display:flex;align-items:center;
  justify-content:center;
  font-size:24px;
  margin:0 auto 12px;
  background:rgba(184,146,42,0.05);
}
.strip-label{
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--cream);
}

/* ── DETAILS / SPECS ── */
.details{
  background:var(--warm);
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;
}
.details-left{
  padding:100px 60px;
  border-right:1px solid var(--border);
}
.details-right{padding:100px 60px;}
.spec-list{margin-top:48px;}
.spec-item{
  display:flex;align-items:flex-start;
  gap:24px;
  padding:24px 0;
  border-bottom:1px solid var(--border);
}
.spec-item:first-child{border-top:1px solid var(--border);}
.spec-number{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:900;
  color:var(--gold);
  opacity:0.3;line-height:1;
  min-width:48px;
}
.spec-text h4{
  font-size:14px;font-weight:500;
  letter-spacing:0.05em;
  margin-bottom:6px;
}
.spec-text p{
  font-size:13px;font-weight:300;
  line-height:1.7;color:var(--muted);
}
.stat-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:2px;margin-top:48px;
}
.stat-box{
  background:var(--cream);
  padding:36px 28px;
}
.stat-value{
  font-family:'Playfair Display',serif;
  font-size:48px;font-weight:900;
  color:var(--ink);line-height:1;
  margin-bottom:8px;
}
.stat-value span{font-size:24px;color:var(--gold);}
.stat-label{
  font-size:11px;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted);
}
/* ── TESTIMONIALS ── */
.testimonials{background:var(--cream);}
.testimonials-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:2px;margin-top:64px;
}
.testimonial-card{
  background:var(--warm);
  padding:40px 36px;
  position:relative;
}
.testimonial-card::before{
  content:'"';
  font-family:'Playfair Display',serif;
  font-size:120px;
  font-weight:900;
  color:var(--gold);
  opacity:0.1;
  position:absolute;
  top:-10px;left:20px;
  line-height:1;
}
.testimonial-stars{
  color:var(--gold);
  font-size:14px;
  margin-bottom:20px;
  letter-spacing:2px;
}
.testimonial-text{
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-style:italic;
  line-height:1.8;
  color:var(--ink);
  margin-bottom:28px;
}
.testimonial-author{
  display:flex;align-items:center;gap:14px;
}
.author-avatar{
  width:44px;height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--rust));
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  color:var(--cream);
}
.author-name{
  font-size:13px;font-weight:500;
  margin-bottom:2px;
}
.author-location{
  font-size:11px;letter-spacing:0.1em;
  color:var(--muted);
}

/* ── CATALOG GRID ── */
.catalog{background:var(--ink);}
.catalog .section-title{color:var(--cream);}
.catalog .section-label{color:var(--gold-light);}
.catalog-grid{
  margin-top:64px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}
.catalog-item{
  border:1px solid rgba(184,146,42,0.15);
  padding:28px 24px;
  transition:border-color 0.3s,background 0.3s;
  cursor:pointer;
}
